<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>결혼준비 투두리스트</title>
    <style>
      /* 기본 스타일 */
      body {
        font-family: Arial, sans-serif;
        background: #ffe6f0; /* 옅은 분홍색 배경 */
        margin: 0;
        padding: 20px;
      }
      .container {
        max-width: 500px;
        margin: 20px auto;
        background: #fff;
        padding: 20px;
        border-radius: 4px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      h2 {
        text-align: center;
      }
      .menu-item,
      button {
        display: block;
        width: 100%;
        margin: 10px 0;
        padding: 10px;
        font-size: 16px;
        cursor: pointer;
        border: 1px solid #ddd;
        border-radius: 4px;
        background: #eee;
      }
      .menu-item:hover,
      button:hover {
        background: #ddd;
      }
      input,
      select {
        width: 100%;
        padding: 8px;
        margin: 5px 0 15px 0;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .screen {
        display: none;
      }
      .active {
        display: block;
      }
      ul {
        list-style: none;
        padding: 0;
      }
      li {
        padding: 8px;
        border-bottom: 1px solid #eee;
      }
      /* 삭제 화면에서 항목마다 번호와 삭제 버튼 스타일 */
      .delete-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid #eee;
      }
      .delete-item button {
        padding: 5px 10px;
        font-size: 14px;
        border: none;
        background: #dc3545;
        color: #fff;
        border-radius: 4px;
        cursor: pointer;
      }
      /* 첫 화면 이미지 스타일 */
      #mainScreen img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 0 auto 20px auto;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 1. 첫번째 화면: 메인 메뉴 (이미지 삽입) -->
      <div id="mainScreen" class="screen active">
        <!-- 원하는 이미지 파일명을 src에 넣어주세요 -->
        <img src="wedding.jpg" alt="Wedding 이미지" />
        <h2>결혼준비 투두리스트</h2>
        <div class="menu-item" onclick="goToScreen('ourTasksScreen')">
          1. 우리의 결혼준비
        </div>
        <div
          class="menu-item"
          onclick="alert('다른사람들의 할일보기는 구현 예정입니다.')"
        >
          2. 다른이들의 결혼준비
        </div>
        <div
          class="menu-item"
          onclick="alert('결혼준비정보(예식장, 드레스샵 등 정보)는 구현 예정입니다.')"
        >
          3. 결혼준비정보
        </div>
      </div>

      <!-- 2. 우리의 할일 선택 시 화면 → 우리의 결혼준비 화면 -->
      <div id="ourTasksScreen" class="screen">
        <h2>우리의 결혼준비</h2>
        <button onclick="goToScreen('overallViewScreen')">1. 전체보기</button>
        <button onclick="goToScreen('modifyTasksScreen')">2. 수정하기</button>
        <button onclick="goToScreen('mainScreen')">뒤로가기</button>
      </div>

      <!-- 3. 전체보기 화면: 총 결혼비용 및 할일목록 -->
      <div id="overallViewScreen" class="screen">
        <h2>전체보기</h2>
        <p>우리의 총 결혼비용은? <strong id="totalCost">0원</strong></p>
        <h3>할일 목록</h3>
        <ul id="taskList">
          <!-- 추가된 할일 항목들이 보여집니다. -->
        </ul>
        <button onclick="goToScreen('ourTasksScreen')">뒤로가기</button>
      </div>

      <!-- 4. 수정하기 화면: 추가와 삭제 선택 -->
      <div id="modifyTasksScreen" class="screen">
        <h2>수정하기</h2>
        <button onclick="goToScreen('addTaskScreen')">1. 추가하기</button>
        <button onclick="populateDeleteScreen()">2. 삭제</button>
        <button onclick="goToScreen('ourTasksScreen')">뒤로가기</button>
      </div>

      <!-- 5. 추가하기 화면: 날짜, 할일, 예상금액, 담당자 선택 -->
      <div id="addTaskScreen" class="screen">
        <h2>추가하기</h2>
        <form id="addTaskForm" onsubmit="event.preventDefault(); addTask();">
          <label for="taskDate">날짜 선택:</label>
          <input type="date" id="taskDate" required />

          <label for="taskDesc">할일:</label>
          <input
            type="text"
            id="taskDesc"
            placeholder="할 일을 입력하세요"
            required
          />

          <label for="taskCost">예상금액:</label>
          <input
            type="number"
            id="taskCost"
            placeholder="예상 금액을 입력하세요"
            required
          />

          <label for="taskAssignee">누가 할지?</label>
          <select id="taskAssignee" required>
            <option value="">선택하세요</option>
            <option value="예신이">예신이</option>
            <option value="예랑이">예랑이</option>
            <option value="함께하기">함께하기</option>
          </select>

          <button type="submit">추가하기</button>
        </form>
        <button onclick="goToScreen('modifyTasksScreen')">뒤로가기</button>
      </div>

      <!-- 6. 삭제 화면: 삭제할 항목 선택 -->
      <div id="deleteTaskScreen" class="screen">
        <h2>삭제할 할일 선택</h2>
        <ul id="deleteTaskList">
          <!-- 삭제할 항목 목록이 동적으로 생성됩니다. -->
        </ul>
        <button onclick="goToScreen('modifyTasksScreen')">뒤로가기</button>
      </div>
    </div>

    <script>
      // 화면 전환 함수
      function goToScreen(screenId) {
        const screens = document.querySelectorAll(".screen");
        screens.forEach((screen) => screen.classList.remove("active"));
        document.getElementById(screenId).classList.add("active");
      }

      // 총 결혼비용 변수
      let totalCost = 0;

      // 할일 추가 함수
      function addTask() {
        const date = document.getElementById("taskDate").value;
        const desc = document.getElementById("taskDesc").value;
        const cost = document.getElementById("taskCost").value;
        const assignee = document.getElementById("taskAssignee").value;

        if (!date || !desc || !cost || !assignee) {
          alert("모든 필드를 입력하세요.");
          return;
        }

        // 할일 목록에 항목 추가 (전체보기 화면에 표시)
        const taskList = document.getElementById("taskList");
        const li = document.createElement("li");
        // 항목 텍스트에 날짜, 내용, 예상금액, 담당자 정보를 표시
        li.textContent = `${date} - ${desc} (${cost}원) - ${assignee}`;
        // 나중에 삭제 시 예상금액을 업데이트하기 위해 data-cost 속성에 저장
        li.setAttribute("data-cost", cost);
        taskList.appendChild(li);

        // 총 결혼비용 업데이트
        totalCost += parseInt(cost);
        document.getElementById("totalCost").textContent = totalCost + "원";

        // 폼 리셋 후 이전 화면으로 이동
        document.getElementById("addTaskForm").reset();
        goToScreen("modifyTasksScreen");
      }

      // 삭제 화면에 현재 할일 목록을 불러와서 각 항목마다 삭제 버튼 생성
      function populateDeleteScreen() {
        const deleteTaskList = document.getElementById("deleteTaskList");
        deleteTaskList.innerHTML = ""; // 이전 내용 초기화
        const taskList = document.getElementById("taskList");
        const tasks = taskList.children;

        if (tasks.length === 0) {
          const li = document.createElement("li");
          li.textContent = "삭제할 할일이 없습니다.";
          deleteTaskList.appendChild(li);
        } else {
          // tasks는 HTMLCollection이므로 Array.from()으로 배열로 변환
          Array.from(tasks).forEach((task, index) => {
            const li = document.createElement("li");
            li.className = "delete-item";
            // 항목 번호와 내용을 표시 (예: "1. 2025-03-01 - 예식장 예약 (500000원) - 예신이")
            li.innerHTML = `<span>${index + 1}. ${task.textContent}</span>`;
            const delBtn = document.createElement("button");
            delBtn.textContent = "삭제";
            delBtn.addEventListener("click", () => {
              // 삭제할 항목의 예상금액을 가져와 총 비용 업데이트
              const taskCost = parseInt(task.getAttribute("data-cost") || "0");
              totalCost -= taskCost;
              document.getElementById("totalCost").textContent =
                totalCost + "원";
              // 전체보기 목록에서도 해당 항목 삭제
              task.remove();
              // 삭제 화면에서도 해당 항목의 li 삭제
              li.remove();
              // 목록이 모두 삭제되었으면 삭제 화면에 메시지 표시
              if (taskList.children.length === 0) {
                const emptyLi = document.createElement("li");
                emptyLi.textContent = "삭제할 할일이 없습니다.";
                deleteTaskList.appendChild(emptyLi);
              }
            });
            li.appendChild(delBtn);
            deleteTaskList.appendChild(li);
          });
        }
        goToScreen("deleteTaskScreen");
      }
    </script>
  </body>
</html>
