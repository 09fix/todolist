<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>결혼준비 투두리스트</title>
    <style>
      /* 기본 스타일 */
      body {
        font-family: Arial, sans-serif; /* 기본 폰트 설정 */
        background: #ffe6f0; /* 배경을 옅은 분홍색으로 설정 */
        margin: 0; /* 기본 마진 제거 */
        padding: 20px; /* 내부 여백 설정 */
      }
      .container {
        max-width: 500px; /* 화면 너비 제한 */
        margin: 20px auto; /* 수평 중앙 정렬 */
        background: #fff; /* 배경을 흰색으로 설정 */
        padding: 20px; /* 내부 여백 */
        border-radius: 4px; /* 모서리를 둥글게 */
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); /* 그림자 효과 */
      }
      h2 {
        text-align: center; /* 제목 중앙 정렬 */
      }
      /* 메뉴 항목 스타일 */
      .menu-item,
      button {
        display: block; /* 블록 레벨 요소로 표시 */
        width: 100%; /* 100% 너비 */
        margin: 10px 0; /* 상하 여백 */
        padding: 10px; /* 내부 여백 */
        font-size: 16px; /* 글자 크기 */
        cursor: pointer; /* 마우스 커서를 손 모양으로 설정 */
        border: 1px solid #ddd; /* 테두리 */
        border-radius: 4px; /* 모서리 둥글게 */
        background: #eee; /* 배경색 설정 */
      }
      /* 메뉴 항목과 버튼에 마우스를 올리면 배경색 변화 */
      .menu-item:hover,
      button:hover {
        background: #ddd; /* 마우스를 올리면 배경이 진해짐 */
      }
      /* 입력 필드 스타일 */
      input,
      select {
        width: 100%; /* 100% 너비 */
        padding: 8px; /* 내부 여백 */
        margin: 5px 0 15px 0; /* 상단과 하단 여백 */
        box-sizing: border-box; /* 크기 계산 시 여백 포함 */
        border: 1px solid #ccc; /* 테두리 색 */
        border-radius: 4px; /* 모서리 둥글게 */
      }
      /* 화면 전환을 위한 .screen 클래스 */
      .screen {
        display: none; /* 기본적으로 숨김 처리 */
      }
      /* .active 클래스가 붙으면 화면이 보이도록 설정 */
      .active {
        display: block;
      }
      /* 할일 목록 스타일 */
      ul {
        list-style: none; /* 기본 목록 스타일 제거 */
        padding: 0; /* 패딩 제거 */
      }
      li {
        padding: 8px; /* 각 항목에 패딩 추가 */
        border-bottom: 1px solid #eee; /* 항목 간 구분선 추가 */
      }
      /* 삭제 화면에서 항목마다 번호와 삭제 버튼 스타일 */
      .delete-item {
        display: flex; /* 플렉스 레이아웃으로 정렬 */
        justify-content: space-between; /* 항목과 버튼을 양 끝으로 배치 */
        align-items: center; /* 수직 중앙 정렬 */
        padding: 8px 0; /* 위, 아래 여백 추가 */
        border-bottom: 1px solid #eee; /* 항목 간 구분선 */
      }
      .delete-item button {
        padding: 5px 10px; /* 버튼 내부 여백 */
        font-size: 14px; /* 버튼 글자 크기 */
        border: none; /* 테두리 제거 */
        background: #dc3545; /* 빨간색 배경 */
        color: #fff; /* 글자 색 흰색 */
        border-radius: 4px; /* 버튼 모서리 둥글게 */
        cursor: pointer; /* 마우스 커서를 손 모양으로 설정 */
      }
      /* 첫 화면 이미지 스타일 */
      #mainScreen img {
        max-width: 100%; /* 이미지를 화면에 맞게 크기 조정 */
        height: auto; /* 비율을 유지하면서 높이 자동 조정 */
        display: block; /* 블록 레벨로 표시 */
        margin: 0 auto 20px auto; /* 중앙 정렬하고 아래에 여백 추가 */
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 1. 첫번째 화면: 메인 메뉴 (이미지 삽입) -->
      <div id="mainScreen" class="screen active">
        <!-- 원하는 이미지 파일명을 src에 넣어주세요 -->
        <img src="wedding.jpg" alt="Wedding 이미지" />
        <h2>결혼준비 투두리스트</h2>
        <!-- 결혼준비 메뉴 항목 -->
        <div class="menu-item" onclick="goToScreen('ourTasksScreen')">
          1. 우리의 결혼준비
        </div>
        <div
          class="menu-item"
          onclick="alert('다른사람들의 할일보기는 구현 예정입니다.')"
        >
          2. 다른이들의 결혼준비
        </div>
        <div
          class="menu-item"
          onclick="alert('결혼준비정보(예식장, 드레스샵 등 정보)는 구현 예정입니다.')"
        >
          3. 결혼준비정보
        </div>
      </div>

      <!-- 2. 우리의 할일 선택 시 화면 → 우리의 결혼준비 화면 -->
      <div id="ourTasksScreen" class="screen">
        <h2>우리의 결혼준비</h2>
        <!-- '전체보기' 버튼 클릭 시 전체보기 화면으로 이동 -->
        <button onclick="goToScreen('overallViewScreen')">1. 전체보기</button>
        <!-- '수정하기' 버튼 클릭 시 수정 화면으로 이동 -->
        <button onclick="goToScreen('modifyTasksScreen')">2. 수정하기</button>
        <!-- '뒤로가기' 버튼 클릭 시 메인 화면으로 이동 -->
        <button onclick="goToScreen('mainScreen')">뒤로가기</button>
      </div>

      <!-- 3. 전체보기 화면: 총 결혼비용 및 할일목록 -->
      <div id="overallViewScreen" class="screen">
        <h2>전체보기</h2>
        <!-- 총 결혼비용 표시 -->
        <p>우리의 총 결혼비용은? <strong id="totalCost">0원</strong></p>
        <h3>할일 목록</h3>
        <ul id="taskList">
          <!-- 추가된 할일 항목들이 보여집니다. -->
        </ul>
        <!-- 뒤로가기 버튼 클릭 시 '우리의 결혼준비' 화면으로 이동 -->
        <button onclick="goToScreen('ourTasksScreen')">뒤로가기</button>
      </div>

      <!-- 4. 수정하기 화면: 추가와 삭제 선택 -->
      <div id="modifyTasksScreen" class="screen">
        <h2>수정하기</h2>
        <!-- '추가하기' 버튼 클릭 시 추가 화면으로 이동 -->
        <button onclick="goToScreen('addTaskScreen')">1. 추가하기</button>
        <!-- '삭제' 버튼 클릭 시 삭제 화면으로 이동 -->
        <button onclick="populateDeleteScreen()">2. 삭제</button>
        <!-- 뒤로가기 버튼 클릭 시 '우리의 결혼준비' 화면으로 이동 -->
        <button onclick="goToScreen('ourTasksScreen')">뒤로가기</button>
      </div>

      <!-- 5. 추가하기 화면: 날짜, 할일, 예상금액, 담당자 선택 -->
      <div id="addTaskScreen" class="screen">
        <h2>추가하기</h2>
        <!-- 할일을 추가하는 폼 -->
        <form id="addTaskForm" onsubmit="event.preventDefault(); addTask();">
          <label for="taskDate">날짜 선택:</label>
          <input type="date" id="taskDate" required />

          <label for="taskDesc">할일:</label>
          <input
            type="text"
            id="taskDesc"
            placeholder="할 일을 입력하세요"
            required
          />

          <label for="taskCost">예상금액:</label>
          <input
            type="number"
            id="taskCost"
            placeholder="예상 금액을 입력하세요"
            required
          />

          <label for="taskAssignee">누가 할지?</label>
          <select id="taskAssignee" required>
            <option value="">선택하세요</option>
            <option value="예신이">예신이</option>
            <option value="예랑이">예랑이</option>
            <option value="함께하기">함께하기</option>
          </select>

          <button type="submit">추가하기</button>
        </form>
        <!-- 뒤로가기 버튼 클릭 시 '수정하기' 화면으로 이동 -->
        <button onclick="goToScreen('modifyTasksScreen')">뒤로가기</button>
      </div>

      <!-- 6. 삭제 화면: 삭제할 항목 선택 -->
      <div id="deleteTaskScreen" class="screen">
        <h2>삭제할 할일 선택</h2>
        <!-- 삭제할 항목 목록 -->
        <ul id="deleteTaskList">
          <!-- 삭제할 항목 목록이 동적으로 생성됩니다. -->
        </ul>
        <!-- 뒤로가기 버튼 클릭 시 '수정하기' 화면으로 이동 -->
        <button onclick="goToScreen('modifyTasksScreen')">뒤로가기</button>
      </div>
    </div>

    <script>
      // 화면 전환 함수: 클릭된 화면을 보여주고 다른 화면은 숨김 처리
      function goToScreen(screenId) {
        const screens = document.querySelectorAll(".screen"); // 모든 .screen 요소 선택
        screens.forEach((screen) => screen.classList.remove("active")); // 모든 화면 숨기기
        document.getElementById(screenId).classList.add("active"); // 선택한 화면만 보이도록 active 클래스 추가
      }

      // 총 결혼비용 변수
      let totalCost = 0;

      // 할일 추가 함수
      function addTask() {
        const date = document.getElementById("taskDate").value; // 날짜 값
        const desc = document.getElementById("taskDesc").value; // 할일 내용
        const cost = document.getElementById("taskCost").value; // 예상 금액
        const assignee = document.getElementById("taskAssignee").value; // 담당자

        if (!date || !desc || !cost || !assignee) {
          alert("모든 필드를 입력하세요."); // 필수 입력값이 비어 있으면 경고 메시지
          return;
        }

        // 할일 목록에 항목 추가
        const taskList = document.getElementById("taskList");
        const li = document.createElement("li");
        li.textContent = `${date} - ${desc} (${cost}원) - ${assignee}`; // 항목 내용 표시
        li.setAttribute("data-cost", cost); // 예상 금액을 data-cost 속성에 저장
        taskList.appendChild(li);

        // 총 결혼비용 업데이트
        totalCost += parseInt(cost); // 예상 금액을 총 결혼비용에 더함
        document.getElementById("totalCost").textContent = totalCost + "원"; // 총 결혼비용 화면에 표시

        // 폼 리셋 후 수정 화면으로 이동
        document.getElementById("addTaskForm").reset();
        goToScreen("modifyTasksScreen");
      }

      // 삭제 화면에 현재 할일 목록을 불러와서 각 항목마다 삭제 버튼 생성
      function populateDeleteScreen() {
        const deleteTaskList = document.getElementById("deleteTaskList");
        deleteTaskList.innerHTML = ""; // 이전 내용 초기화
        const taskList = document.getElementById("taskList");
        const tasks = taskList.children; // 할일 목록 항목들 가져오기

        if (tasks.length === 0) {
          const li = document.createElement("li");
          li.textContent = "삭제할 할일이 없습니다."; // 할일 목록이 없으면 메시지 표시
          deleteTaskList.appendChild(li);
        } else {
          // tasks는 HTMLCollection이므로 Array.from()으로 배열로 변환하여 순회
          Array.from(tasks).forEach((task, index) => {
            const li = document.createElement("li");
            li.className = "delete-item";
            li.innerHTML = `<span>${index + 1}. ${task.textContent}</span>`; // 항목 번호와 내용 표시
            const delBtn = document.createElement("button");
            delBtn.textContent = "삭제"; // 삭제 버튼 생성
            delBtn.addEventListener("click", () => {
              const taskCost = parseInt(task.getAttribute("data-cost") || "0"); // 항목 예상 금액 가져오기
              totalCost -= taskCost; // 총 결혼비용에서 금액 빼기
              document.getElementById("totalCost").textContent =
                totalCost + "원"; // 총 결혼비용 업데이트
              task.remove(); // 할일 목록에서 해당 항목 삭제
              li.remove(); // 삭제 화면에서 해당 항목의 li 삭제
              // 목록이 모두 삭제되었으면 삭제 화면에 메시지 표시
              if (taskList.children.length === 0) {
                const emptyLi = document.createElement("li");
                emptyLi.textContent = "삭제할 할일이 없습니다."; // 삭제할 항목이 없으면 메시지 표시
                deleteTaskList.appendChild(emptyLi);
              }
            });
            li.appendChild(delBtn); // 삭제 버튼 추가
            deleteTaskList.appendChild(li); // 삭제 화면에 항목 추가
          });
        }
        // 삭제 화면으로 이동
        goToScreen("deleteTaskScreen");
      }
    </script>
  </body>
</html>
