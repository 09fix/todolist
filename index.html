<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Road</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- 1. 메인 화면 -->
      <div id="main Screen" class="sreen active">
        <!-- 메인 이미지 삽입 -->
        <img src="main.png" alt="main image" />

        <h2>결혼준비 투두리스트</h2>

        <!-- 결혼준비 메뉴 항목 -->
        <div class="menu=item" onclick="goToScreen('ourTasksScreen')">
          1. 우리의 결혼준비
        </div>
        <div class="menu-item" onclick="alert('준비중입니다.')">
          2. 다른 이들의 결혼준비
        </div>
        <div class="menu-item" onclick="alert('준비중입니다.')">
          3. 결혼준비정보
        </div>
      </div>

      <!-- 2. 우리의 결혼준비 선택 시, 화면-->
      <div id="ourTasksScreen" class="screen">
        <h2>우리의 결혼준비</h2>
        <!-- 각각의 버튼 클릭 시, 해당 화면으로 이동합니다. -->
        <button onclick="goToScreen('overallViewScreen')">1. 전체보기</button>
        <button onclick="goToScreen('modifyTasksScreen')">2. 수정하기</button>
        <button onclick="goToScreen('mainScreen')">뒤로가기</button>
      </div>

      <!-- 3. 전체보기 화면: 총 결혼비용 및 할일목록-->
      <div id="overallViewScreen" class="screen">
        <h2>전체보기</h2>
        <!-- 총 결혼비용을 표시합니다. -->
        <p>우리의 총 결혼비용은?<strong id="totalCost">0원</strong></p>
        <h3>우리의 일정</h3>
        <ul id="taskList">
          <!-- 추가된 할 일이 보여집니다. -->
        </ul>
        <!-- 뒤로가기 버튼 클릭 시, '우리의 결혼준비' 화면으로 이동합니다. -->
        <button onclick="goToScreen('ourTasksScreen')">뒤로가기</button>
      </div>

      <!-- 4. 수정하기 화면: 추가와 삭제 선택 -->
      <div id="modifyTasksScreen" class="screen">
        <h2>수정하기</h2>
        <!-- 각각의 버튼 클릭 시, 해당 화면으로 이동합니다. -->
        <button onclick="goToScreen('addTaskScreen')">1. 추가하기</button>
        <button onclick="populateDeleteScreen()">2. 삭제</button>
        <button onclick="goToScreen('ourTasksScreen')">뒤로가기</button>
      </div>

      <!-- 5. 추가하기 화면: 날짜, 할 일, 예상금액, 담당자 선택 -->
      <div id="addTaskScreen" class="screen">
        <h2>추가하기</h2>
        <!-- 할 일을 추가합니다. -->
        <form id="addTaskForm" onsubmit="event.preventDefault(); addTask()">
          <label for="taskDate">날짜 선택:</label>
          <input type="data" id="taskeDate" required />

          <label for="taskDesc">할 일:</label>
          <input
            type="text"
            id="taskDesc"
            placeholder="할 일을 입력하세요"
            required
          />

          <label for="taksCost">예상금액:</label>
          <input
            type="number"
            id="taskCost"
            placeholder="예상 금액을
          입력하세요"
            required
          />

          <label for="taskAssignee">누가 하나요?</label>
          <select id="taskAssignee" required>
            <option value="">선택하세요</option>
            <option value="예신이">예신이</option>
            <option value="예랑이">예랑이</option>
            <option value="함께하기">함께하기</option>
          </select>

          <button type="submit">추가하기</button>
        </form>
        <!-- 뒤로가기 버튼 클릭 시, '수정하기' 화면으로 이동합니다. -->
        <button onclick="goToScreen('modifyTasksScreen')">뒤로가기</button>
      </div>

      <!-- 6. 삭제 화면: 삭제할 항목 선택 -->
      <div id="deleteTaskScreen" class="screen">
        <h2>삭제할 일정 선택</h2>
        <ul id="delete TaskList">
          <!-- 삭제할 항목 목록이 동적으로 생성 -->
        </ul>
        <!-- 뒤로가기 버튼 클릭 시, '수정하기' 화면으로 이동합니다. -->
        <button onclick="goToScreen('modifyTasksScreen')">뒤로가기</button>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
